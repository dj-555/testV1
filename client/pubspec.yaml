name: quran_live_class_client
description: Quran Live Class Android app with mediasoup, Socket.IO, and WebRTC.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

# If you run Flutter 3.35.x (Dart 3.x), use this dependency profile instead:
# environment:
#   sdk: ">=3.3.0 <4.0.0"
# dependencies:
#   flutter_webrtc: ^1.2.0
#   socket_io_client: ^3.1.2
#   mediasfu_mediasoup_client: ^0.1.3
# Then change import in lib/webrtc_client.dart to:
# import 'package:mediasfu_mediasoup_client/mediasfu_mediasoup_client.dart' as ms;

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: 0.9.34
  socket_io_client: 2.0.3+1
  mediasoup_client_flutter: 0.8.5
  permission_handler: 10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true


